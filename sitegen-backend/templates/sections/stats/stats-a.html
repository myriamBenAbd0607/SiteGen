<!-- ============================================================
     STATS A - Barre sombre overlap hero
     Idéal pour : Architecture, luxe, immobilier
     ============================================================ -->

<section class="stats-a" style="
  position: relative;
  z-index: 10;
  margin-top: -50px;
  padding: 0 24px;
">
  <div style="
    max-width: 1200px;
    margin: 0 auto;
    background: var(--dark);
    border-radius: 16px;
    padding: 48px 60px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    box-shadow: 0 24px 48px rgba(0,0,0,0.15);
  ">
    {{STATS_HTML}}
  </div>

  <style>
    .stats-a .stat-item {
      text-align: center;
      padding: 0 20px;
      border-right: 1px solid rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.6s var(--ease);
    }
    .stats-a .stat-item:last-child { border-right: none; }
    .stats-a .stat-item.visible { opacity: 1; transform: translateY(0); }
    .stats-a .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
      display: block;
    }
    .stats-a .stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    @media (max-width: 768px) {
      .stats-a > div { grid-template-columns: repeat(2, 1fr); padding: 32px 24px; }
      .stats-a .stat-item { border-right: none; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .stats-a .stat-item:nth-child(3) { border-bottom: none; }
      .stats-a .stat-item:last-child { border-bottom: none; }
    }
  </style>
</section>
