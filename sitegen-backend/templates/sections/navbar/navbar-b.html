<!-- ============================================================
     NAVBAR B - Avec barre de contact au-dessus
     Idéal pour : Business, services, professionnel
     ============================================================ -->

<!-- Top bar (contact) -->
<div class="topbar" style="
  background: var(--dark);
  color: rgba(255,255,255,0.5);
  font-size: 0.75rem;
  padding: 6px 0;
">
  <div class="container" style="
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    justify-content: space-between;
  ">
    <span>📞 {{TELEPHONE}} &nbsp;|&nbsp; ✉️ {{EMAIL}}</span>
    <span>{{TOP_BAR_TEXT}}</span>
  </div>
</div>

<!-- Navbar principale -->
<nav class="navbar" style="
  position: sticky;
  top: 0;
  width: 100%;
  padding: 16px 0;
  z-index: 1000;
  background: white;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
">
  <div class="container" style="
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  ">
    <!-- Logo -->
    <a href="/" class="logo" style="
      display: flex;
      align-items: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
      letter-spacing: -0.5px;
    ">
      {{LOGO_HTML}}
    </a>

    <!-- Liens -->
    <ul class="nav-links" style="
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    ">
      <li><a href="#portfolio" style="
        color: rgba(0,0,0,0.7);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_PORTFOLIO}}</a></li>
      <li><a href="#services" style="
        color: rgba(0,0,0,0.7);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_SERVICES}}</a></li>
      <li><a href="#about" style="
        color: rgba(0,0,0,0.7);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_ABOUT}}</a></li>
      <li><a href="#faq" style="
        color: rgba(0,0,0,0.7);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_FAQ}}</a></li>
    </ul>

    <!-- CTA -->
    <a href="#contact" class="btn-nav-cta" style="
      padding: 10px 28px;
      background: var(--accent);
      color: var(--dark);
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s var(--ease);
    ">
      {{NAV_CTA}}
    </a>

    <button class="hamburger" style="
      display: none;
      background: none;
      border: none;
      color: var(--dark);
      font-size: 1.5rem;
      cursor: pointer;
    ">☰</button>
  </div>

  <style>
    .nav-links a::after {
      content: '';
      display: block;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.3s var(--ease);
      margin-top: 2px;
    }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a:hover { color: var(--accent) !important; }

    .btn-nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    @media (max-width: 960px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
      .btn-nav-cta { display: none; }
    }
  </style>
</nav>
