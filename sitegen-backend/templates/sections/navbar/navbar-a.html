<!-- ============================================================
     NAVBAR A - Minimal / Transparent / Logo + Liens + CTA
     Idéal pour : Luxe, architecture, créatif, premium
     ============================================================ -->

<nav class="navbar" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 20px 0;
  z-index: 1000;
  transition: all 0.4s var(--ease);
  background: transparent;
">
  <div class="container" style="
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  ">
    <!-- Logo -->
    <a href="/" class="logo" style="
      display: flex;
      align-items: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      letter-spacing: -0.5px;
      transition: color 0.3s var(--ease);
    ">
      {{LOGO_HTML}}
    </a>

    <!-- Liens -->
    <ul class="nav-links" style="
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    ">
      <li><a href="#portfolio" style="
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_PORTFOLIO}}</a></li>
      <li><a href="#services" style="
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_SERVICES}}</a></li>
      <li><a href="#about" style="
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_ABOUT}}</a></li>
      <li><a href="#faq" style="
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
        transition: color 0.3s var(--ease);
      ">{{NAV_FAQ}}</a></li>
    </ul>

    <!-- CTA -->
    <a href="#contact" class="btn-nav-cta" style="
      padding: 10px 28px;
      background: var(--accent);
      color: var(--dark);
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s var(--ease);
    ">
      {{NAV_CTA}}
    </a>

    <!-- Hamburger mobile -->
    <button class="hamburger" style="
      display: none;
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    ">☰</button>
  </div>

  <style>
    .navbar.scrolled {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.06);
      padding: 12px 0;
    }
    .navbar.scrolled .logo { color: var(--dark); }
    .navbar.scrolled .nav-links a { color: rgba(0,0,0,0.7); }
    .navbar.scrolled .nav-links a:hover { color: var(--accent); }
    .navbar.scrolled .hamburger { color: var(--dark); }

    .nav-links a::after {
      content: '';
      display: block;
      width: 0;
      height: 1.5px;
      background: var(--accent);
      transition: width 0.3s var(--ease);
    }
    .nav-links a:hover::after { width: 100%; }

    .btn-nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    @media (max-width: 960px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
      .btn-nav-cta { display: none; }
    }
  </style>
</nav>
