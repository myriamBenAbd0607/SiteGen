<!-- ============================================================
     FAQ B - Pleine largeur centré / Accordéon simple
     Idéal pour : Services, SaaS, sites à forte conversion
     ============================================================ -->

<section class="faq-b" style="
  padding: 100px 24px;
  background: var(--light-bg);
">
  <div class="container" style="
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
  ">
    <!-- En-tête -->
    <div style="margin-bottom: 48px;">
      <span class="section-eyebrow">FAQ</span>
      <h2 style="
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(2rem, 4vw, 2.8rem);
        font-weight: 700;
        color: var(--dark);
        line-height: 1.1;
        letter-spacing: -1px;
        margin-bottom: 12px;
      ">
        {{FAQ_TITLE}}
      </h2>
      <p style="
        color: var(--gray);
        line-height: 1.7;
        font-size: 1rem;
        max-width: 520px;
        margin: 0 auto;
      ">
        {{FAQ_SUBTITLE}}
      </p>
    </div>

    <!-- Accordéon -->
    <div style="
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    ">
      {{FAQ_HTML}}
    </div>

    <!-- CTA en bas -->
    <div style="margin-top: 40px;">
      <a href="#contact" class="btn-primary" style="
        display: inline-block;
        background: var(--accent);
        color: var(--dark);
        padding: 14px 40px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.92rem;
        transition: all 0.3s var(--ease);
      ">
        {{FAQ_CTA}} →
      </a>
    </div>
  </div>

  <style>
    .faq-b .faq-item {
      border-radius: 12px;
      background: white;
      border: 1px solid rgba(0,0,0,0.04);
      overflow: hidden;
      transition: all 0.3s var(--ease);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .faq-b .faq-item:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }
    .faq-b .faq-item.active {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .faq-b .faq-question {
      padding: 18px 24px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color 0.3s;
    }
    .faq-b .faq-item.active .faq-question {
      color: var(--accent);
    }
    .faq-b .faq-toggle {
      font-size: 1.3rem;
      color: var(--accent);
      transition: transform 0.35s var(--ease);
      line-height: 1;
    }
    .faq-b .faq-item.active .faq-toggle {
      transform: rotate(45deg);
    }
    .faq-b .faq-answer {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.4s var(--ease), opacity 0.3s;
    }
    .faq-b .faq-item.active .faq-answer {
      max-height: 200px;
      opacity: 1;
    }
    .faq-b .faq-answer p {
      padding: 0 24px 20px;
      color: var(--gray);
      font-size: 0.9rem;
      line-height: 1.65;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
  </style>
</section>
