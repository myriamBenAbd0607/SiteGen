<!-- ============================================================
     PORTFOLIO A — Bento Grid Ultra Premium
     Glassmorphism · Particles · Hover 3D · Style Apple 2024
     ============================================================ -->

<section class="portfolio-a" style="
  padding: 140px 24px;
  background: var(--dark);
  overflow: hidden;
  position: relative;
">

  <!-- Fond ambiance : orbes lumineux -->
  <div style="pointer-events:none;position:absolute;inset:0;overflow:hidden;z-index:0;">
    <div style="
      position:absolute; top:-200px; left:-100px;
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity:0.07; filter:blur(60px);
    "></div>
    <div style="
      position:absolute; bottom:-150px; right:-100px;
      width:500px; height:500px; border-radius:50%;
      background:radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity:0.05; filter:blur(60px);
    "></div>
  </div>

  <div style="max-width:1280px; margin:0 auto; position:relative; z-index:1;">

    <!-- ── En-tête ── -->
    <div style="
      display:flex; align-items:flex-end;
      justify-content:space-between;
      margin-bottom:64px; flex-wrap:wrap; gap:24px;
    ">
      <div>
        <div style="
          display:inline-flex; align-items:center; gap:8px;
          background:rgba(255,255,255,0.06);
          border:1px solid rgba(255,255,255,0.1);
          border-radius:100px; padding:6px 16px;
          margin-bottom:20px;
        ">
          <span style="
            width:6px; height:6px; border-radius:50%;
            background:var(--accent); display:inline-block;
            animation: pa-pulse 2s ease-in-out infinite;
          "></span>
          <span style="
            color:var(--accent); font-size:0.65rem;
            text-transform:uppercase; letter-spacing:3px; font-weight:700;
          ">{{PORTFOLIO_EYEBROW}}</span>
        </div>
        <h2 style="
          font-family:'Space Grotesk',sans-serif;
          font-size:clamp(2.2rem,5vw,3.8rem);
          font-weight:800; color:white;
          line-height:1.0; letter-spacing:-2px; margin:0;
        ">{{PORTFOLIO_TITLE}}</h2>
      </div>

      <a href="#contact" class="pa-cta-link">
        Voir tout
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <!-- ── Bento Grid ── -->
    <div class="pa-bento">
      {{PORTFOLIO_HTML}}
    </div>

  </div><!-- /container -->

  <!-- ── STYLES ── -->
  <style>
    @keyframes pa-pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.8); }
    }
    @keyframes pa-shine {
      0%   { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(400%) rotate(45deg); }
    }
    @keyframes pa-float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }

    /* ── CTA header link ── */
    .pa-cta-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.35s ease;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .pa-cta-link:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    /* ── Bento grid ── */
    .pa-bento {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 210px;
      gap: 14px;
    }

    /* Disposition asymétrique premium */
    .pa-card:nth-child(1) { grid-column: span 5; grid-row: span 3; }
    .pa-card:nth-child(2) { grid-column: span 4; grid-row: span 2; }
    .pa-card:nth-child(3) { grid-column: span 3; grid-row: span 1; }
    .pa-card:nth-child(4) { grid-column: span 3; grid-row: span 1; }
    .pa-card:nth-child(5) { grid-column: span 7; grid-row: span 1; }
    .pa-card:nth-child(6) { grid-column: span 4; grid-row: span 1; }

    /* ── Carte ── */
    .pa-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      transition:
        transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
        box-shadow 0.5s ease,
        border-color 0.4s ease;
      will-change: transform;
    }
    .pa-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow:
        0 32px 64px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.12),
        inset 0 1px 0 rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
    }

    /* Effet shine au hover */
    .pa-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 40%;
      height: 200%;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(255,255,255,0.06) 50%,
        transparent 100%
      );
      transform: rotate(45deg) translateX(-100%);
      z-index: 10;
      transition: none;
      pointer-events: none;
    }
    .pa-card:hover::before {
      animation: pa-shine 0.7s ease forwards;
    }

    /* Image */
    .pa-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), filter 0.6s ease;
      filter: brightness(0.8) saturate(0.9);
    }
    .pa-card:hover .pa-card__img {
      transform: scale(1.08);
      filter: brightness(0.55) saturate(1.1);
    }

    /* Gradient permanent en bas */
    .pa-card__grad {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.92) 0%,
        rgba(0,0,0,0.4) 35%,
        rgba(0,0,0,0.0) 60%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* Overlay accent au hover */
    .pa-card__accent {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        var(--accent) 0%,
        transparent 55%
      );
      opacity: 0;
      z-index: 2;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .pa-card:hover .pa-card__accent {
      opacity: 0.18;
    }

    /* Numéro décoratif */
    .pa-card__num {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 5;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.65rem;
      font-weight: 800;
      color: rgba(255,255,255,0.2);
      letter-spacing: 2px;
      transition: color 0.4s, transform 0.4s;
    }
    .pa-card:hover .pa-card__num {
      color: var(--accent);
      transform: scale(1.1);
    }

    /* Badge catégorie */
    .pa-card__badge {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 5;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(-6px);
      transition: all 0.35s 0.05s ease;
    }
    .pa-card:hover .pa-card__badge {
      opacity: 1;
      transform: translateY(0);
    }

    /* Contenu principal (bas de la carte) */
    .pa-card__info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Tag accent */
    .pa-card__tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--accent);
      color: var(--dark);
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
      width: fit-content;
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.4s 0.05s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .pa-card:hover .pa-card__tag {
      opacity: 1;
      transform: translateY(0);
    }

    /* Titre */
    .pa-card__title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: white;
      margin: 0 0 6px;
      line-height: 1.2;
      transform: translateY(6px);
      transition: transform 0.45s 0.08s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .pa-card:nth-child(1) .pa-card__title { font-size: 1.7rem; letter-spacing: -0.5px; }
    .pa-card:hover .pa-card__title { transform: translateY(0); }

    /* Description */
    .pa-card__desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      margin: 0 0 14px;
      line-height: 1.55;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s 0.1s ease, opacity 0.4s 0.12s ease;
    }
    .pa-card:hover .pa-card__desc {
      max-height: 80px;
      opacity: 1;
    }

    /* Glassmorphism footer info */
    .pa-card__glass {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s 0.15s cubic-bezier(0.23, 1, 0.32, 1);
      width: fit-content;
    }
    .pa-card:hover .pa-card__glass {
      opacity: 1;
      transform: translateY(0);
    }
    .pa-card__glass-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }
    .pa-card__glass-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 50%;
      color: var(--dark);
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .pa-card:hover .pa-card__glass-arrow {
      transform: rotate(-45deg);
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .pa-bento {
        grid-template-columns: repeat(6, 1fr);
        grid-auto-rows: 190px;
      }
      .pa-card:nth-child(1) { grid-column: span 6; grid-row: span 2; }
      .pa-card:nth-child(2) { grid-column: span 3; grid-row: span 2; }
      .pa-card:nth-child(3) { grid-column: span 3; grid-row: span 1; }
      .pa-card:nth-child(4) { grid-column: span 3; grid-row: span 1; }
      .pa-card:nth-child(5) { grid-column: span 4; grid-row: span 1; }
      .pa-card:nth-child(6) { grid-column: span 2; grid-row: span 1; }
    }
    @media (max-width: 600px) {
      .pa-bento {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 180px;
        gap: 10px;
      }
      .pa-card { grid-column: span 1 !important; grid-row: span 1 !important; }
      .pa-card:nth-child(1) { grid-column: span 2 !important; grid-row: span 1 !important; }
    }
  </style>

  <!-- ── SCRIPT ── -->
  <script>
  (function() {
    function init() {
      var cards = document.querySelectorAll('.pa-card');
      if (!cards.length) return;

      /* — Scroll reveal — */
      var obs = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry, i) {
          if (entry.isIntersecting) {
            var el = entry.target;
            var delay = parseInt(el.getAttribute('data-delay') || 0);
            setTimeout(function() {
              el.style.opacity = '1';
              el.style.transform = 'translateY(0) scale(1)';
            }, delay);
            obs.unobserve(el);
          }
        });
      }, { threshold: 0.08 });

      cards.forEach(function(card, i) {
        card.setAttribute('data-delay', i * 90);
        card.style.opacity = '0';
        card.style.transform = 'translateY(32px) scale(0.97)';
        card.style.transition = 'opacity 0.7s ease, transform 0.7s cubic-bezier(0.23,1,0.32,1)';
        obs.observe(card);
      });

      /* — Tilt 3D léger au survol — */
      cards.forEach(function(card) {
        card.addEventListener('mousemove', function(e) {
          var rect = card.getBoundingClientRect();
          var x = (e.clientX - rect.left) / rect.width  - 0.5;
          var y = (e.clientY - rect.top)  / rect.height - 0.5;
          card.style.transform =
            'translateY(-6px) scale(1.01) ' +
            'rotateX(' + (-y * 6) + 'deg) ' +
            'rotateY(' + ( x * 6) + 'deg)';
        });
        card.addEventListener('mouseleave', function() {
          card.style.transform = '';
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>

</section>
