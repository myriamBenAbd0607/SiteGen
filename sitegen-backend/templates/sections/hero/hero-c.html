<!-- ============================================================
     HERO C - Centré / Fond dégradé / Sans image
     Idéal pour : Services, consulting, B2B, marques minimales
     ============================================================ -->

<section class="hero-c" style="
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: linear-gradient(135deg, var(--dark) 0%, var(--accent) 100%);
  padding: 60px 24px;
  position: relative;
  overflow: hidden;
">

  <!-- Élément décoratif -->
  <div style="
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    pointer-events: none;
  "></div>
  <div style="
    position: absolute;
    bottom: -300px;
    left: -200px;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: rgba(255,255,255,0.02);
    pointer-events: none;
  "></div>

  <!-- Contenu -->
  <div style="
    position: relative;
    z-index: 2;
    max-width: 720px;
  ">
    <!-- Badge -->
    <span style="
      display: inline-block;
      padding: 6px 24px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      margin-bottom: 24px;
    ">
      {{HERO_BADGE}}
    </span>

    <!-- Titre -->
    <h1 style="
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 800;
      color: white;
      line-height: 1.05;
      margin-bottom: 20px;
      letter-spacing: -2px;
    ">
      {{HERO_TITLE}}
    </h1>

    <!-- Sous-titre -->
    <p style="
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      color: rgba(255,255,255,0.6);
      line-height: 1.8;
      margin: 0 auto 32px;
      max-width: 520px;
    ">
      {{HERO_SUBTITLE}}
    </p>

    <!-- CTA -->
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
      <a href="#contact" style="
        padding: 14px 40px;
        background: white;
        color: var(--dark);
        border-radius: 50px;
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s var(--ease);
      ">
        {{HERO_CTA_PRIMARY}}
      </a>
      <a href="#services" style="
        padding: 14px 32px;
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s var(--ease);
      ">
        {{HERO_CTA_SECONDARY}}
      </a>
    </div>
  </div>

  <style>
    .hero-c a:first-child:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(255,255,255,0.15);
    }
    .hero-c a:last-child:hover {
      background: rgba(255,255,255,0.08);
      border-color: white;
    }
  </style>
</section><!-- ============================================================
